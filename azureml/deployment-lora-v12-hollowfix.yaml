# daisy-lora-v12-hollow-fix retrain (registered as model version 14; job
# olive_street_kw9r698kf7), evaluated with the same tuned inference config that
# fixed the v11 corruption issue (tight token budget, stop_strings, lower temp).
# A/B against gpu-deployment-finetuned (v11, natural3 build).
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: gpu-deployment-v12-hollowfix
endpoint_name: daisy-therapy
model: azureml:daisy-finetuned-lora:14
code_configuration:
  code: ../inference
  scoring_script: score.py
environment:
  conda_file: ../inference/conda.yaml
  image: mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.8-cudnn8-ubuntu22.04
environment_variables:
  BASE_MODEL: "Qwen/Qwen2.5-7B-Instruct"
  MODEL_DISPLAY_NAME: "daisy-model"
  INFERENCE_QUANTIZATION: "4bit"
  ENABLE_ROUTER_PASS: "false"
  DEFER_MEMORY_UPDATE: "true"
  CJK_MAX_RETRIES: "1"
  COORDINATOR_BACKEND: "internal"
  USE_AZURE_TRANSLATOR: "false"
  USE_OPENAI_TRANSLATION: "true"
  USE_AZURE_OPENAI: "true"
  DAISY_DIRECT_MULTILINGUAL: "true"
  USE_TEMPLATE_FALLBACK: "false"
  DAISY_INFERENCE_MODE: "simple"
  DAISY_PROMPT_MODE: "full"
  INFERENCE_BUILD: "2026-07-lora-v12-hollowfix"
  DAISY_RAG: "false"
  DAISY_BM25: "false"
  DAISY_CONFIDENCE_GATE: "false"
  DAISY_DEFAULT_MAX_TOKENS: "90"
  DAISY_THERAPY_MIN_NEW: "48"
  DAISY_LORA_DEFAULT_TEMP: "0.55"
  DAISY_AGGRESSIVE_TRIM: "false"
instance_type: Standard_NC4as_T4_v3
instance_count: 1
request_settings:
  request_timeout_ms: 180000
  max_concurrent_requests_per_instance: 1
liveness_probe:
  initial_delay: 600
  period: 60
  timeout: 30
readiness_probe:
  initial_delay: 600
  period: 60
  timeout: 30
