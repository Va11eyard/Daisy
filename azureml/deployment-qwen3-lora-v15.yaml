# Qwen3-8B + LoRA v15 — production target (gpu-deployment-v14 slot).
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: gpu-deployment-v14
endpoint_name: daisy-therapy
model: azureml:daisy-finetuned-lora:15
code_configuration:
  code: ../inference
  scoring_script: score_qwen3_aml.py
environment:
  conda_file: ../inference/conda.yaml
  image: mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.8-cudnn8-ubuntu22.04
environment_variables:
  BASE_MODEL: "Qwen/Qwen3-8B"
  MODEL_DISPLAY_NAME: "daisy-model"
  INFERENCE_BUILD: "2026-07-qwen3-v16-memory"
  INFERENCE_QUANTIZATION: "4bit"
  DAISY_DIRECT_MULTILINGUAL: "true"
  DAISY_DEFAULT_MAX_TOKENS: "256"
  DAISY_STOP_STRINGS: "Assistant:,Question:,User:,Human:,\\n\\nUser,\\nUser:,\\nAssistant:,assistant,ASURE,❮REFINE❯,OffsetTable,Daisy x,👋ly,\\n\\n"
  DAISY_LORA_DEFAULT_TEMP: "0.6"
  DAISY_VOICE_QC: "true"
  DAISY_MAX_VOICE_REGENS: "2"
  DEFER_MEMORY_UPDATE: "true"
  USE_AZURE_TRANSLATOR: "false"
  USE_OPENAI_TRANSLATION: "true"
  USE_AZURE_OPENAI: "true"
instance_type: Standard_NC4as_T4_v3
instance_count: 1
request_settings:
  request_timeout_ms: 180000
  max_concurrent_requests_per_instance: 1
liveness_probe:
  initial_delay: 600
  period: 60
  timeout: 30
readiness_probe:
  initial_delay: 600
  period: 60
  timeout: 30
