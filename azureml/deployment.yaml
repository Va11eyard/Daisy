# Managed online deployment — production: daisy-therapy / gpu-deployment-finetuned (update model version after new training).
# Create: az ml online-deployment create --file azureml/deployment.yaml -g Daisy_group -w Daisy
# Update:  az ml online-deployment update  --file azureml/deployment.yaml -g Daisy_group -w Daisy
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: gpu-deployment-finetuned
endpoint_name: daisy-therapy
model: azureml:daisy-finetuned-lora:11
code_configuration:
  code: ../inference
  scoring_script: score.py
environment:
  conda_file: ../inference/conda.yaml
  image: mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.8-cudnn8-ubuntu22.04
environment_variables:
  BASE_MODEL: "Qwen/Qwen2.5-7B-Instruct"
  MODEL_DISPLAY_NAME: "daisy-model"
  # VRAM: none=fp16 | 4bit | 8bit (bitsandbytes). 4bit recommended on T4 16GB for 7B + headroom.
  INFERENCE_QUANTIZATION: "4bit"
  # Two-pass routing: short JSON plan → main reply. Set "false" to save latency.
  ENABLE_ROUTER_PASS: "false"
  DEFER_MEMORY_UPDATE: "true"
  CJK_MAX_RETRIES: "1"
  # Coordinator: internal | azure_openai | http (see inference/coordinator.py)
  COORDINATOR_BACKEND: "internal"
  # Optional second Qwen (e.g. 3B) for router only; uses same INFERENCE_QUANTIZATION as 7B — fits on T4 with 4bit.
  # COORDINATOR_MODEL: "Qwen/Qwen2.5-3B-Instruct"
  # COORDINATOR_AZURE_DEPLOYMENT: "gpt-4o-mini"
  # COORDINATOR_URL: "https://your-tiny-model/score"
  # COORDINATOR_API_KEY: ""
  USE_AZURE_TRANSLATOR: "false"
  # Enable when AZURE_OPENAI_* keys are set on the deployment (ru/kk → generate in EN, translate back).
  USE_OPENAI_TRANSLATION: "true"
  # Alias read by inference/translator.py (live Studio may set this instead of USE_OPENAI_TRANSLATION).
  USE_AZURE_OPENAI: "true"
  DAISY_DIRECT_MULTILINGUAL: "true"
# Set HF_TOKEN (and optional translator / Azure OpenAI keys) in the deployment — do not commit secrets.
instance_type: Standard_NC4as_T4_v3
instance_count: 1
request_settings:
  request_timeout_ms: 180000
  max_concurrent_requests_per_instance: 1
liveness_probe:
  initial_delay: 600
  period: 60
  timeout: 30
readiness_probe:
  initial_delay: 600
  period: 60
  timeout: 30
