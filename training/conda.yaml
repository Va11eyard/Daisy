# Base image: mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.8-cudnn8-ubuntu22.04
# Install PyTorch built for CUDA 11.8. Plain "torch" from PyPI is often cu12x and may not
# initialize CUDA on the node (driver mismatch) → no GPU → 7B + LoRA falls back to host RAM → SIGKILL.
name: daisy-training
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu118
    - torch==2.6.0+cu118
    - transformers>=4.40.0
    - accelerate>=0.27.0
    - peft>=0.11.0
    - datasets>=2.18.0
    - bitsandbytes>=0.43.0
    - pyyaml>=6.0
